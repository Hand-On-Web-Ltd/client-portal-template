<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>Client Portal</h1>
      <p>Sign in to view your projects</p>
      <form id="loginForm">
        <input type="email" value="demo@example.com" placeholder="Email" required>
        <input type="password" value="demo123" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>
  <div id="portal" class="portal">
    <header>
      <h2>📋 Client Portal</h2>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>
    <div class="container">
      <div id="projectList"></div>
      <div id="projectDetail" style="display:none"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
